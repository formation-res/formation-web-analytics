services:
  analytics-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    environment:
      - cluster.name=formation-analytics-browser-smoke
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1024m -Xmx1024m"
      - cluster.routing.allocation.disk.threshold_enabled=false
      - xpack.security.enabled=false
      - http.host=0.0.0.0
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ES_PORT:-19920}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  collector:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      analytics-elasticsearch:
        condition: service_healthy
    environment:
      ALLOWED_DOMAINS: "collector,test-site"
      SITE_ORIGIN_MAP: "${SITE_ID}:test-site"
      ELASTICSEARCH_URL: "http://analytics-elasticsearch:9200"
      ELASTICSEARCH_API_KEY: "dummy"
      ELASTICSEARCH_DATA_STREAM: "${DATA_STREAM_NAME:-web-analytics}"
      GEOIP_DB_PATH: "/data/GeoLite2-City.mmdb"
      FLUSH_INTERVAL: "100ms"
      MAX_BATCH_SIZE: "1"
      MAX_QUEUE_SIZE: "100"
      MAX_PAYLOAD_BYTES: "4096"
      MAX_EVENTS_PER_REQUEST: "10"
      MAX_FIELD_LENGTH: "512"
      MAX_PAYLOAD_ENTRIES: "32"
      MAX_PAYLOAD_DEPTH: "4"
      REQUIRE_ORIGIN: "true"
      REQUIRE_URL_HOST_MATCH: "true"
      RATE_LIMIT_PER_MINUTE: "300"
      TRUST_PROXY_HEADERS: "false"
      CAPTURE_CLIENT_IP: "false"
    volumes:
      - ${GEOIP_DB_FILE}:/data/GeoLite2-City.mmdb:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  browser-client-smoke:
    build:
      context: .
      dockerfile: e2e/browser-client-test/Dockerfile
    depends_on:
      collector:
        condition: service_healthy
    environment:
      ANALYTICS_ENDPOINT: "http://collector:8080/collect"
      ANALYTICS_SITE_ID: "${SITE_ID}"
      ELASTICSEARCH_URL: "http://analytics-elasticsearch:9200"
      ELASTICSEARCH_DATA_STREAM: "${DATA_STREAM_NAME:-web-analytics}"
      TEST_PAGE_URL: "http://test-site/pricing?utm_source=browser-smoke"
      TEST_PAGE_REFERRER: "http://referrer.test/campaign"
